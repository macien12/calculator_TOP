<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="main">
        <div id="display"></div>
        <div id="buttons">
            <div id="row1">
                <button id="clear">AC</button>
                <button id="backscpace">C</button>
            </div>
            <div id="row2">
                <button id="number7">7</button>
                <button id="number8">8</button>
                <button id="number9">9</button>
                <button id="division">/</button>
            </div>
            <div id="row3">
                <button id="number4">4</button>
                <button id="number5">5</button>
                <button id="number6">6</button>
                <button id="multiple">*</button>
            </div>
            <div id="row4">
                <button id="number1">1</button>
                <button id="number2">2</button>
                <button id="number3">3</button>
                <button id="substraction">-</button>
            </div>
            <div id="row5">
                <button id="comma">.</button>
                <button id="0">0</button>
                <button id="equal">=</button>
                <button id="plus">+</button>
            </div>
        </div>
    </div>
</body>
</html>
